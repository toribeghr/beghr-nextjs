<svg viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg">
  <!-- Lion Head -->
  <g fill="#D4AF37">
    <!-- Mane -->
    <path d="M50 80 Q30 60 20 80 Q15 100 35 110 M150 80 Q170 60 180 80 Q185 100 165 110"/>
    <path d="M60 50 Q50 40 45 50 Q40 65 60 75 M140 50 Q150 40 155 50 Q160 65 140 75"/>
    <path d="M70 30 Q65 20 60 30 Q55 50 75 60"/>

    <!-- Head -->
    <ellipse cx="100" cy="100" rx="45" ry="55"/>

    <!-- Snout -->
    <ellipse cx="100" cy="130" rx="30" ry="35" fill="#F5A623"/>

    <!-- Chin -->
    <path d="M75 160 Q100 175 125 160 L120 155 Q100 165 80 155 Z" fill="#D4AF37"/>

    <!-- Eyes -->
    <circle cx="85" cy="85" r="6" fill="#0A0E27"/>
    <circle cx="115" cy="85" r="6" fill="#0A0E27"/>
    <circle cx="86" cy="82" r="2" fill="#fff"/>
    <circle cx="116" cy="82" r="2" fill="#fff"/>

    <!-- Nose -->
    <path d="M95 115 L100 125 L105 115 Z" fill="#0A0E27"/>
  </g>

  <!-- Key -->
  <g fill="none" stroke="#7A8A9E" stroke-width="8" stroke-linecap="round">
    <!-- Key shaft -->
    <line x1="40" y1="160" x2="140" y2="160"/>

    <!-- Key head (circle) -->
    <circle cx="55" cy="160" r="12"/>

    <!-- Key teeth -->
    <line x1="120" y1="150" x2="120" y2="170"/>
    <line x1="135" y1="150" x2="135" y2="170"/>
  </g>
</svg>